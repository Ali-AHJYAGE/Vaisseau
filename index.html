<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#070810">
  <title>Le Vaisseau</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<div id="menu">
  <h1>🚀 Le Vaisseau</h1>
  <p>Ouvre ce lien dans deux appareils (ou deux onglets), choisis un rôle dans chacun.</p>
  <div id="conn-status"></div>
  <div class="btns">
    <button class="b-inno" onclick="start('innocent')">😇 Innocent·e</button>
    <button class="b-impo" onclick="start('imposteur')">😈 Imposteur</button>
  </div>
  <button class="b-local" onclick="startLocal()">🏠 Jouer en local — même écran</button>
  <button class="b-ghost" onclick="resetGame()">↻ Réinitialiser</button>
  <p class="hint">
    😇 Accomplis les 4 tâches. Téléporteurs 🌀 et baie médicale ✚ pour t'en sortir.<br>
    😈 Approche et frappe via le bouton d'action. Sabote les lumières ou l'O₂.
  </p>
</div>

<div id="stage">
  <canvas id="cv" width="760" height="560"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hearts"></div>
    <div id="hud-right">
      <div class="chip" id="task-chip">Tâches : 0/4</div>
      <div class="chip" id="status-chip"></div>
    </div>
  </div>

  <!-- Panneau de boutons d'action -->
  <div id="action-panel">
    <button id="btn-task"   class="act-btn" onclick="doTask()">⚙️<br>Tâche</button>
    <button id="btn-tp"     class="act-btn" onclick="doTeleport()">🌀<br>Téléport</button>
    <button id="btn-attack" class="act-btn" onclick="doAttack()">⚔️<br>Frapper</button>
    <button id="btn-sab"    class="act-btn" onclick="doSabLights()">💡<br>Lumières</button>
    <button id="btn-oxy"    class="act-btn" onclick="doSabOxy()">🔴<br>O₂</button>
  </div>

  <!-- Joystick virtuel -->
  <div id="joystick-zone"><div id="joystick-knob"></div></div>

  <!-- Overlays -->
  <div id="minigame">
    <div id="mg-box">
      <button id="mg-close" onclick="closeMinigame(false)" title="Échap">✕</button>
      <h3 id="mg-title"></h3>
      <p id="mg-desc"></p>
      <div id="mg-area"></div>
    </div>
  </div>
  <div id="banner">
    <h2 id="banner-text"></h2>
    <button class="b-ghost" onclick="resetGame()">Rejouer</button>
  </div>
</div>

<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/input.js"></script>
<script src="js/physics.js"></script>
<script src="js/minigames.js"></script>
<script src="js/network.js"></script>
<script src="js/render.js"></script>
<script src="js/hud.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
<script src="js/touch.js"></script>
</body>
</html>
